<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>查看/取消我的報名</title>
  <link rel="stylesheet" href="/static/style.css">
  <style>
    .form-group { margin: 10px 0; }
    .form-group label { display:block; margin-bottom:6px; }
    input[type="text"] { width:100%; max-width:520px; padding:8px; box-sizing:border-box; }
    button { margin-top:14px; padding:8px 14px; }
    .role-list { display:flex; flex-direction:column; gap:10px; align-items:flex-start; }
    label.role-choice { display:flex; gap:6px; align-items:center; }
  </style>
</head>
<body>
<div class="container">
  <div class="topbar">
    <h1>查看/取消我的報名</h1>
    <div><a href="/">🏠 回首頁</a></div>
  </div>

  <hr>

  <form method="POST">
    <h3>登入資訊</h3>

    <div class="role-list">
      <label class="role-choice">
        <input type="radio" name="role" value="student" required>
        <span>學生</span>
      </label>
      <label class="role-choice">
        <input type="radio" name="role" value="teacher" required>
        <span>老師</span>
      </label>
    </div>

    <div class="form-group">
      <label>姓名</label>
      <input type="text" name="name" required>
    </div>

    <div class="form-group" id="student-only" style="display:none;">
      <label>學號（學生必填）</label>
      <input type="text" name="student_id">
    </div>

    <div class="form-group" id="teacher-only" style="display:none;">
      <label>服務單位（老師必填）</label>
      <input type="text" name="unit">
    </div>

    <div class="form-group">
      <label>電話</label>
      <input type="text" name="phone" required>
    </div>

    <button type="submit">登入並查看我的報名</button>
  </form>
</div>

<script>
  const studentOnly = document.getElementById("student-only");
  const teacherOnly = document.getElementById("teacher-only");

  function updateByRole(){
    const role = document.querySelector('input[name="role"]:checked')?.value;
    if(role === "student"){
      studentOnly.style.display = "block";
      teacherOnly.style.display = "none";
    }else if(role === "teacher"){
      studentOnly.style.display = "none";
      teacherOnly.style.display = "block";
    }
  }

  document.querySelectorAll('input[name="role"]').forEach(el=>{
    el.addEventListener("change", updateByRole);
  });
  updateByRole();
</script>
</body>
</html>
